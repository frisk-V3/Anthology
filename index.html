<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>埋め込みビューア</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      background-color: #f9f9f9;
    }
    h2 {
      color: #333;
    }
    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: monospace;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #0056b3;
    }
    h3 {
      margin-top: 30px;
      color: #333;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }
    #viewer {
      border: 2px dashed #ccc;
      background-color: #fff;
      padding: 20px;
      min-height: 300px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
    }
  </style>
</head>
<body>

  <h2>埋め込みコードを貼ってください</h2>
  <p>YouTubeのiframeやSNSの埋め込みタグを入力してください。</p>

  <textarea id="input" placeholder='<iframe src="..." ...></iframe>'></textarea>
  <button onclick="renderEmbed()">表示する</button>

  <h3>プレビュー</h3>
  <div id="viewer"></div>

  <script>
    function renderEmbed() {
      const input = document.getElementById('input').value;
      const viewer = document.getElementById('viewer');
      
      // プレビューエリアを一度空にする
      viewer.innerHTML = input;

      // 埋め込みコード内のscriptタグ（Twitter/Instagram等）を動作させるための処理
      const scripts = Array.from(viewer.querySelectorAll("script"));
      scripts.forEach(oldScript => {
        const newScript = document.createElement("script");
        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    }
  </script>

</body>
</html>
